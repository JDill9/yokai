name: Build modded APK

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Copy CI gradle.properties
        run: |
          mkdir -p ~/.gradle
          cp .github/runner-files/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Build the app
        run: ./gradlew assembleStandardNightly

      - name: Run unit tests
        run: ./gradlew testStandardNightlyUnitTest

      - name: Upload APKs to artifact
        uses: actions/upload-artifact@v4
        with:
          name: yokai-mod-apks
          path: app/build/outputs/apk/standard/nightly/*.apk
